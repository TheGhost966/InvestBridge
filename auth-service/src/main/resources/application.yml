server:
  port: 8081

spring:
  application:
    name: auth-service

  data:
    mongodb:
      uri: ${AUTH_MONGO_URI:mongodb://localhost:27017/authdb}

    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: ${JWT_SECRET:please-set-this-in-your-env-file-min-32-chars}
  expiry-ms: 3600000   # 1 hour in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.platform.auth: DEBUG